name: Playwright Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  test-ui:
    name: UI Tests (Shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run UI tests (sharded)
        run: npx playwright test --project=ui --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'https://automationintesting.online' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password' }}

      - name: Upload UI test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-ui-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7

  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (for request context)
        run: npx playwright install --with-deps chromium

      - name: Run API tests
        run: npx playwright test --project=api
        env:
          CI: true
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://automationintesting.online/api/' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME || 'admin' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'password' }}

      - name: Upload API test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 7
